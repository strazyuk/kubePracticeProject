apiVersion: v1
kind: ServiceAccount
metadata:
  name: blog-backend-sa
  namespace: dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: blog-backend-role
  namespace: dev
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: blog-backend-rolebinding
  namespace: dev
subjects:
- kind: ServiceAccount
  name: blog-backend-sa
  namespace: dev
roleRef:
  kind: Role
  name: blog-backend-role
  apiGroup: rbac.authorization.k8s.io
