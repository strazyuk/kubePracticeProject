apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: {{ .Values.namespace }}
data:
  # The MongoDB URI uses the stable DNS name from our Headless Service.
  # Format: mongodb://<service-name>.<namespace>.svc.cluster.local
  MONGO_URI: "mongodb://mongodb.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.mongodb.port }}/blog"
  PORT: "{{ .Values.backend.port }}"
