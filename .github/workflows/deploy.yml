name: Build and Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/blog-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/blog-backend:${{ github.sha }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/blog-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/blog-frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_B64 }}

      - name: Deploy to Kubernetes
        run: |
          helm upgrade --install blog-app ./charts/blog-app \
            --set backend.image=${{ secrets.DOCKERHUB_USERNAME }}/blog-backend \
            --set backend.tag=${{ github.sha }} \
            --set frontend.image=${{ secrets.DOCKERHUB_USERNAME }}/blog-frontend \
            --set frontend.tag=${{ github.sha }} \
            --namespace dev \
            --create-namespace
